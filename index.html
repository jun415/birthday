<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎂 生日贺卡入口</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      min-height:100vh;
      background:linear-gradient(135deg,#1a0f2e 0%,#0f0a1a 50%,#0a0e1e 100%);
      display:flex;align-items:center;justify-content:center;
      font-family:'PingFang SC','Microsoft YaHei','Segoe UI',sans-serif;
      padding:2rem;
      position:relative;overflow:hidden;
    }
    .bg-orb{
      position:fixed;border-radius:50%;pointer-events:none;
      filter:blur(60px);opacity:0.15;
    }
    .bg-orb-1{width:300px;height:300px;background:#8b5cf6;top:-10%;left:-5%;animation:orbF 10s infinite alternate}
    .bg-orb-2{width:250px;height:250px;background:#f59e0b;bottom:-5%;right:-5%;animation:orbF 12s 2s infinite alternate}
    @keyframes orbF{0%{transform:translate(0,0)}100%{transform:translate(30px,-20px)}}

    .container{
      position:relative;z-index:10;
      max-width:480px;width:100%;
      text-align:center;
    }
    .title{
      font-size:1.8rem;font-weight:800;
      color:#ffd966;
      text-shadow:0 0 30px rgba(255,170,50,0.3);
      margin-bottom:0.5rem;
    }
    .subtitle{
      font-size:0.95rem;color:rgba(255,225,180,0.5);
      margin-bottom:2rem;
    }
    .card-list{
      display:flex;flex-direction:column;gap:1rem;
    }
    .card-link{
      display:flex;align-items:center;gap:1rem;
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,210,120,0.15);
      border-radius:16px;
      padding:1.2rem 1.5rem;
      text-decoration:none;color:#ffefc0;
      transition:all 0.3s ease;
      backdrop-filter:blur(8px);
    }
    .card-link:hover{
      background:rgba(255,255,255,0.08);
      border-color:rgba(255,210,120,0.35);
      transform:translateY(-2px);
      box-shadow:0 8px 24px rgba(0,0,0,0.3);
    }
    .card-link .emoji{font-size:2rem}
    .card-link .info{text-align:left}
    .card-link .info .name{font-size:1.15rem;font-weight:700;color:#ffd966}
    .card-link .info .desc{font-size:0.8rem;color:rgba(255,225,180,0.4);margin-top:0.15rem}
    .card-link .arrow{margin-left:auto;font-size:1.2rem;color:rgba(255,210,120,0.3)}
  </style>
</head>
<body>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="container">
    <div class="title">🎂 生日贺卡</div>
    <div class="subtitle">点击名字，拆开专属惊喜</div>
    <div class="card-list">
      <a class="card-link" href="李丹丹_生日贺卡.html">
        <span class="emoji">🎁</span>
        <div class="info">
          <div class="name">李丹丹</div>
          <div class="desc">点击拆开你的生日礼物~</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="card-link" href="池晓钧_生日贺卡.html">
        <span class="emoji">🎁</span>
        <div class="info">
          <div class="name">池晓钧</div>
          <div class="desc">点击拆开你的生日礼物~</div>
        </div>
        <span class="arrow">›</span>
      </a>
      <a class="card-link" href="柳嘉欣_生日贺卡.html">
        <span class="emoji">🎁</span>
        <div class="info">
          <div class="name">柳嘉欣</div>
          <div class="desc">点击拆开你的生日礼物~</div>
        </div>
        <span class="arrow">›</span>
      </a>
    </div>
  </div>
</body>
</html>
